<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JayCee's Record Collection</title>
<style>
:root {
  --bg: #ffffff;
  --surface: #f7f7f7;
  --surface2: #ececec;
  --border: #e0e0e0;
  --text: #1a1a1a;
  --muted: #777;
  --accent: #0aa39a;
  --accent-dim: rgba(10,163,154,0.10);
  --accent-music: #d62828;
  --accent-music-dim: rgba(214,40,40,0.10);
  --radius: 8px;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

/* ── Header ── */
header { padding: 20px 32px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
header h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; margin-right: auto; }
header h1 span { color: var(--accent); }
#total-count { color: var(--muted); font-size: 0.85rem; }

/* ── Switcher ── */
#switcher { display: flex; gap: 6px; }
.sw-btn {
  padding: 6px 16px;
  background: none;
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--muted);
  font-size: 0.85rem;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}
.sw-btn:hover:not(.active) { border-color: var(--text); color: var(--text); }
#btn-vinyl.active  { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }
#btn-music.active  { color: var(--accent-music); border-color: var(--accent-music); background: var(--accent-music-dim); }

/* ── Badge artiste commun ── */
.badge-other {
  display: inline-block;
  font-size: 0.65rem;
  padding: 1px 5px;
  border-radius: 10px;
  margin-left: 5px;
  vertical-align: middle;
  opacity: 0.8;
  background: var(--surface2);
  border: 1px solid var(--border);
  cursor: default;
}

/* ── Controls ── */
#controls {
  padding: 16px 32px;
  border-bottom: 1px solid var(--border);
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 10;
}
#search {
  flex: 1 1 220px;
  padding: 9px 14px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 0.95rem;
}
#search:focus { outline: none; border-color: var(--accent); }
select, input[type=number] {
  padding: 8px 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  font-size: 0.85rem;
  cursor: pointer;
}
select:focus, input[type=number]:focus { outline: none; border-color: var(--accent); }
input[type=number] { width: 72px; text-align: center; }
.year-range { display: flex; align-items: center; gap: 6px; color: var(--muted); font-size: 0.85rem; }
.sep { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }

#btn-reset {
  padding: 8px 14px;
  background: none;
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--muted);
  font-size: 0.85rem;
  cursor: pointer;
  white-space: nowrap;
}
#btn-reset:hover { border-color: var(--accent); color: var(--accent); }

/* ── Results bar ── */
#results-bar {
  padding: 10px 32px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 0.85rem;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
}
.view-toggle { display: flex; gap: 0; }
.view-toggle button {
  background: none;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 5px 12px;
  cursor: pointer;
  font-size: 1rem;
  line-height: 1;
}
.view-toggle button:first-child { border-radius: var(--radius) 0 0 var(--radius); }
.view-toggle button:last-child { border-radius: 0 var(--radius) var(--radius) 0; border-left: none; }
.view-toggle button.active { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }

/* ── Grid view ── */
#collection {
  padding: 20px 32px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(175px, 1fr));
  gap: 16px;
}
.card {
  background: var(--surface);
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  content-visibility: auto;
  contain-intrinsic-size: 175px 270px;
}
.card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
.cover-wrap {
  position: relative;
  padding-top: 100%;
  background: var(--surface2);
  overflow: hidden;
}
.cover-wrap img {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  transition: opacity 0.3s;
}
.cover-wrap img.lazy { opacity: 0; }
.cover-wrap img.loaded { opacity: 1; }
.no-cover {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 3rem; color: var(--muted);
}
.card-body { padding: 10px 12px; }
.card-artist { font-size: 0.75rem; color: var(--accent); font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: uppercase; letter-spacing: 0.3px; }
.card-artist.music { color: var(--accent-music); }
.card-title { font-size: 0.85rem; margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
.card-meta { font-size: 0.75rem; color: var(--muted); margin-top: 5px; display: flex; justify-content: space-between; }
.stars { color: var(--accent); letter-spacing: -1px; }

/* ── List view ── */
#collection.list-view {
  display: block;
  padding: 0 32px 20px;
}
#collection.list-view table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.88rem;
}
#collection.list-view th {
  text-align: left;
  padding: 10px 12px;
  color: var(--muted);
  font-weight: 500;
  font-size: 0.78rem;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 57px;
  background: var(--bg);
  z-index: 5;
}
#collection.list-view td {
  padding: 9px 12px;
  border-bottom: 1px solid var(--border);
  vertical-align: middle;
}
#collection.list-view tr:hover td { background: var(--surface); cursor: pointer; }
.list-thumb {
  width: 40px; height: 40px;
  object-fit: cover;
  border-radius: 4px;
  display: block;
  background: var(--surface2);
}
.list-thumb-placeholder {
  width: 40px; height: 40px;
  border-radius: 4px;
  background: var(--surface2);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem;
  color: var(--muted);
}
.tag {
  display: inline-block;
  padding: 2px 7px;
  background: var(--surface2);
  border-radius: 4px;
  font-size: 0.75rem;
  color: var(--muted);
  margin: 1px;
}
.col-artist { color: var(--accent); font-weight: 500; }
.col-artist.music { color: var(--accent-music); }

/* ── Empty state ── */
#empty {
  display: none;
  text-align: center;
  padding: 80px 32px;
  color: var(--muted);
}
#empty .icon { font-size: 3rem; margin-bottom: 12px; }

/* ── Modal ── */
#modal-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.75);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
#modal-overlay.open { display: flex; }
#modal {
  background: var(--surface);
  border-radius: 12px;
  width: 100%;
  max-width: 680px;
  max-height: 90vh;
  overflow-y: auto;
  display: flex;
  gap: 0;
  position: relative;
}
#modal-cover-col {
  width: 220px;
  flex-shrink: 0;
  background: var(--surface2);
  border-radius: 12px 0 0 12px;
  overflow: hidden;
  display: flex;
  align-items: flex-start;
  justify-content: center;
}
#modal-cover-col img { width: 100%; display: block; }
#modal-cover-placeholder {
  width: 100%;
  aspect-ratio: 1;
  display: flex; align-items: center; justify-content: center;
  font-size: 5rem; color: var(--muted);
}
#modal-body {
  padding: 28px 28px 28px 24px;
  flex: 1;
  min-width: 0;
}
#modal-body h2 { font-size: 1.15rem; line-height: 1.3; margin-bottom: 4px; }
#modal-body .modal-artist {
  font-weight: 600;
  font-size: 0.95rem;
  margin-bottom: 20px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
#modal-body .modal-artist.vinyl { color: var(--accent); }
#modal-body .modal-artist.music { color: var(--accent-music); }
.modal-table { width: 100%; border-collapse: collapse; }
.modal-table td { padding: 6px 0; font-size: 0.88rem; vertical-align: top; }
.modal-table td:first-child { color: var(--muted); width: 110px; flex-shrink: 0; padding-right: 12px; }
.modal-table tr { border-bottom: 1px solid var(--border); }
.modal-table tr:last-child { border-bottom: none; }
.modal-stars { color: var(--accent); font-size: 1.1rem; }
#modal-link {
  display: inline-block;
  margin-top: 20px;
  padding: 8px 16px;
  background: var(--accent-dim);
  border: 1px solid var(--accent);
  border-radius: var(--radius);
  color: var(--accent);
  text-decoration: none;
  font-size: 0.85rem;
  font-weight: 500;
}
#modal-link:hover { background: var(--accent); color: #fff; }
#modal-close {
  position: absolute;
  top: 14px; right: 16px;
  background: none;
  border: none;
  color: var(--muted);
  font-size: 1.4rem;
  cursor: pointer;
  line-height: 1;
  padding: 4px 8px;
  border-radius: 4px;
}
#modal-close:hover { color: var(--text); background: var(--surface2); }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

@media (max-width: 600px) {
  #controls { padding: 12px 16px; }
  #collection { padding: 16px; }
  #modal { flex-direction: column; max-width: 100%; }
  #modal-cover-col { width: 100%; border-radius: 12px 12px 0 0; max-height: 220px; overflow: hidden; }
  header { padding: 16px; }
  #results-bar { padding: 8px 16px; }
  #collection.list-view { padding: 0 16px 16px; }
}
</style>
</head>

  <h1>💿 <span>JayCee's Record Collection</span></h1>

  <span id="total-count"></span>

<div id="controls">

    <option value="titre">Titre A → Z</option>
    <option value="annee-asc">Année ↑</option>
    <option value="annee-desc">Année ↓</option>
    <option value="date-desc">Ajouté récemment</option>
    <option value="note-desc">Mieux notés</option>
  </select>

  <button id="btn-reset">Réinitialiser</button>
</div>

<div id="results-bar">
  <span id="count"></span>
  <div class="view-toggle">
    <button id="btn-grid" class="active" title="Grille">⊞</button>
    <button id="btn-list" title="Liste">☰</button>
  </div>
</div>

<div id="collection"></div>
<div id="empty"><div class="icon">🔍</div><div>Aucun élément ne correspond à ces critères.</div></div>

<!-- Modal -->
<div id="modal-overlay">
  <div id="modal">
    <button id="modal-close">✕</button>
    <div id="modal-cover-col">
      <img id="modal-cover-img" src="" alt="" style="display:none">
      <div id="modal-cover-placeholder">💿</div>
    </div>
    <div id="modal-body">
      <div class="modal-artist" id="modal-artist"></div>
      <h2 id="modal-title"></h2>
      <table class="modal-table" id="modal-table"></table>
      <a id="modal-link" href="#" target="_blank" rel="noopener">Voir sur Discogs ↗</a>
    </div>
  </div>
</div>

 "", "nb_titres": 11, "cover_local": "covers_music/Watchhouse__Rituals.jpg", "url": ""}, {"_idx": 75, "_source": "music", "artiste": "Way Dynamic", "titre": "Massive Shoe", "année": 2025, "label": "", "référence": "", "format": "", "quantité": 1, "descriptions": "", "genre": "Indie Pop", "styles": "", "note": 0, "date_ajout": "", "nb_titres": 11, "cover_local": "covers_music/Way_Dynamic__Massive_Shoe.jpg", "url": ""}];
const COMMON_ARTISTS = new Set(["courtney barnett", "herbie hancock", "kurt vile", "kyuss", "led zeppelin", "miles davis", "mos def", "nick drake", "red hot chili peppers"]);

// ── State ──
let currentSource = 'vinyl';
let DATA = DATA_VINYL;
let view = 'grid';
let filtered = [];

// ── DOM ──
const searchEl  = document.getElementById('search');
const genreEl   = document.getElementById('filter-genre');
const styleEl   = document.getElementById('filter-style');
const styleWrap = document.getElementById('style-wrap');
const yearMinEl = document.getElementById('year-min');
const yearMaxEl = document.getElementById('year-max');
const noteEl    = document.getElementById('filter-note');
const sortEl    = document.getElementById('sort');
const collEl    = document.getElementById('collection');
const countEl   = document.getElementById('count');
const totalEl   = document.getElementById('total-count');
const emptyEl   = document.getElementById('empty');
const overlayEl = document.getElementById('modal-overlay');

// ── Helpers ──
function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function yearDisplay(y) { return y ? y : '—'; }

function badgeOther(r) {
  if (!COMMON_ARTISTS.has(r.artiste.toLowerCase())) return '';
  const label = r._source === 'vinyl' ? '🎵 Apple Music' : '💿 Vinyle';
  return `<span class="badge-other" title="Aussi dans : ${label}">${r._source === 'vinyl' ? '🎵' : '💿'}</span>`;
}

// ── Init filters ──
function initFilters() {
  const years  = DATA.map(r => r.année).filter(Boolean);
  const absMin = years.length ? Math.min(...years) : 1900;
  const absMax = years.length ? Math.max(...years) : new Date().getFullYear();
  yearMinEl.placeholder = absMin;
  yearMaxEl.placeholder = absMax;
  yearMinEl.min = absMin; yearMinEl.max = absMax;
  yearMaxEl.min = absMin; yearMaxEl.max = absMax;

  [genreEl, styleEl].forEach(el => { while (el.options.length > 1) el.remove(1); });

  const genres = [...new Set(DATA.map(r => r.genre).filter(Boolean))].sort();
  genres.forEach(g => genreEl.insertAdjacentHTML('beforeend', `<option value="${esc(g)}">${esc(g)}</option>`));

  const isVinyl = currentSource === 'vinyl';
  styleWrap.style.display = isVinyl ? '' : 'none';
  if (isVinyl) {
    const styles = [...new Set(DATA.flatMap(r => r.styles ? r.styles.split(', ') : []).filter(Boolean))].sort();
    styles.forEach(s => styleEl.insertAdjacentHTML('beforeend', `<option value="${esc(s)}">${esc(s)}</option>`));
  }

  const unit = currentSource === 'vinyl' ? 'vinyle' : 'album';
  totalEl.textContent = DATA.length + ' ' + unit + (DATA.length > 1 ? 's' : '');
}

// ── Switch collection ──
function switchCollection(source) {
  currentSource = source;
  DATA = source === 'vinyl' ? DATA_VINYL : DATA_MUSIC;
  document.getElementById('btn-vinyl').classList.toggle('active', source === 'vinyl');
  document.getElementById('btn-music').classList.toggle('active', source === 'music');
  searchEl.value = ''; genreEl.value = ''; styleEl.value = '';
  yearMinEl.value = ''; yearMaxEl.value = '';
  noteEl.value = '0'; sortEl.value = 'artiste-asc';
  initFilters();
  apply();
}

// ── Filter + sort ──
function apply() {
  const q       = searchEl.value.toLowerCase().trim();
  const genre   = genreEl.value;
  const style   = styleEl.value;
  const yMin    = parseInt(yearMinEl.value) || 0;
  const yMax    = parseInt(yearMaxEl.value) || 9999;
  const noteMin = parseInt(noteEl.value) || 0;
  const sort    = sortEl.value;

  filtered = DATA.filter(r => {
    if (q) {
      const hay = [r.artiste, r.titre, r.label, r.styles, r.descriptions, r.référence].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    if (genre && r.genre !== genre) return false;
    if (style && !(r.styles || '').split(', ').includes(style)) return false;
    if (yMin   && r.année && r.année < yMin)      return false;
    if (yMax < 9999 && r.année && r.année > yMax) return false;
    if (noteMin > 0 && r.note < noteMin)          return false;
    return true;
  });

  filtered.sort((a, b) => {
    switch (sort) {
      case 'artiste-asc':  return a.artiste.localeCompare(b.artiste, 'fr');
      case 'artiste-desc': return b.artiste.localeCompare(a.artiste, 'fr');
      case 'titre':        return a.titre.localeCompare(b.titre, 'fr');
      case 'annee-asc':    return (a.année || 9999) - (b.année || 9999);
      case 'annee-desc':   return (b.année || 0) - (a.année || 0);
      case 'date-desc':    return (b.date_ajout || '').localeCompare(a.date_ajout || '');
      case 'note-desc':    return b.note - a.note;
    }
    return 0;
  });

  render();
}

// ── Render ──
function render() {
  const n    = filtered.length;
  const unit = currentSource === 'vinyl' ? 'vinyle' : 'album';
  countEl.textContent = n + ' / ' + DATA.length + ' ' + unit + (DATA.length > 1 ? 's' : '');
  emptyEl.style.display = n === 0 ? 'block' : 'none';
  collEl.style.display  = n === 0 ? 'none'  : '';
  if (view === 'grid') renderGrid();
  else                 renderList();
  lazyLoad();
}

function renderGrid() {
  collEl.className = '';
  collEl.innerHTML = filtered.map(r => {
    const isMusic = r._source === 'music';
    const placeholder = isMusic ? '🎵' : '💿';
    const coverSrc = r.pochette_thumb || r.pochette_url || r.cover_url;
    const img = coverSrc
      ? `<img class="lazy" data-src="${esc(coverSrc)}" alt="">`
      : `<div class="no-cover">${placeholder}</div>`;
    const artistClass = isMusic ? 'card-artist music' : 'card-artist';
    return `
    <div class="card" onclick="openModal(${r._idx})">
      <div class="cover-wrap">${img}</div>
      <div class="card-body">
        <div class="${artistClass}">${esc(r.artiste)}${badgeOther(r)}</div>
        <div class="card-title">${esc(r.titre)}</div>
        <div class="card-meta">
          <span>${yearDisplay(r.année)}</span>
          <span class="stars">${r.note ? '★'.repeat(r.note) : ''}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderList() {
  collEl.className = 'list-view';
  const isVinyl = currentSource === 'vinyl';
  const rows = filtered.map(r => {
    const isMusic = r._source === 'music';
    const placeholder = isMusic ? '🎵' : '💿';
    const thumbSrc = r.pochette_thumb || r.pochette_url || r.cover_url;
    const thumb = thumbSrc
      ? `<img class="list-thumb lazy" data-src="${esc(thumbSrc)}" alt="">`
      : `<div class="list-thumb-placeholder">${placeholder}</div>`;
    const artistClass = isMusic ? 'col-artist music' : 'col-artist';
    const extraCol = isVinyl
      ? `<td>${(r.styles || '').split(', ').filter(Boolean).map(s => `<span class="tag">${esc(s)}</span>`).join('')}</td>`
      : `<td style="color:var(--muted);font-size:0.8rem">${r.nb_titres ? r.nb_titres + ' titre' + (r.nb_titres > 1 ? 's' : '') : '—'}</td>`;
    return `
    <tr onclick="openModal(${r._idx})">
      <td>${thumb}</td>
      <td class="${artistClass}">${esc(r.artiste)}${badgeOther(r)}</td>
      <td>${esc(r.titre)}</td>
      <td>${yearDisplay(r.année)}</td>
      <td>${esc(r.genre || '—')}</td>
      ${extraCol}
      <td>${r.note ? '<span class="stars">' + '★'.repeat(r.note) + '</span>' : '<span style="color:var(--muted)">—</span>'}</td>
    </tr>`;
  }).join('');

  const extraHeader = isVinyl ? '<th>Styles</th>' : '<th>Titres</th>';
  collEl.innerHTML = `
  <table>
    <thead><tr>
      <th></th><th>Artiste</th><th>Titre</th><th>Année</th><th>Genre</th>
      ${extraHeader}<th>Note</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ── Lazy loading ──
let observer;
function lazyLoad() {
  if (observer) observer.disconnect();
  observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const img = e.target;
        img.src = img.dataset.src;
        img.onload = () => img.classList.add('loaded');
        img.onerror = () => { img.style.display='none'; };
        delete img.dataset.src;
        observer.unobserve(img);
      }
    });
  }, { rootMargin: '300px' });
  document.querySelectorAll('img.lazy').forEach(img => observer.observe(img));
}

// ── Modal ──
function openModal(idx) {
  const r = DATA[idx];
  const isVinyl = r._source === 'vinyl';

  const artistEl = document.getElementById('modal-artist');
  artistEl.textContent = r.artiste;
  artistEl.className = 'modal-artist ' + r._source;

  document.getElementById('modal-title').textContent = r.titre;

  const imgEl = document.getElementById('modal-cover-img');
  const phEl  = document.getElementById('modal-cover-placeholder');
  const modalCoverSrc = r.pochette_url || r.pochette_thumb || r.cover_url;
  if (modalCoverSrc) {
    imgEl.src = modalCoverSrc;
    imgEl.style.display = 'block';
    phEl.style.display  = 'none';
    imgEl.onerror = () => { imgEl.style.display='none'; phEl.style.display='flex'; };
  } else {
    imgEl.style.display = 'none';
    phEl.style.display  = 'flex';
    phEl.textContent = isVinyl ? '💿' : '🎵';
  }

  const commonNote = COMMON_ARTISTS.has(r.artiste.toLowerCase())
    ? [['', isVinyl ? '🎵 Aussi dans Apple Music' : '💿 Aussi en vinyle']]
    : [];

  let rows;
  if (isVinyl) {
    rows = [
      ['Année',     r.année || '—'],
      ['Label',     r.label || '—'],
      ['Référence', r.référence || '—'],
      ['Format',    [r.format, r.descriptions].filter(Boolean).join(' · ') || '—'],
      ['Quantité',  r.quantité > 1 ? r.quantité + ' disques' : '1 disque'],
      ['Genre',     r.genre || '—'],
      ['Styles',    r.styles || '—'],
      ['Note',      r.note ? '★'.repeat(r.note) + '☆'.repeat(5 - r.note) + ` (${r.note}/5)` : '—'],
      ['Ajouté le', r.date_ajout || '—'],
      ...commonNote,
    ];
  } else {
    rows = [
      ['Année',     r.année || '—'],
      ['Genre',     r.genre || '—'],
      ['Titres',    r.nb_titres ? r.nb_titres + ' titre' + (r.nb_titres > 1 ? 's' : '') : '—'],
      ['Note',      r.note ? '★'.repeat(r.note) + '☆'.repeat(5 - r.note) + ` (${r.note}/5)` : '—'],
      ['Ajouté le', r.date_ajout || '—'],
      ...commonNote,
    ];
  }

  document.getElementById('modal-table').innerHTML = rows.map(([k, v]) =>
    `<tr><td>${esc(k)}</td><td>${esc(v)}</td></tr>`
  ).join('');

  const link = document.getElementById('modal-link');
  if (isVinyl && r.url) {
    link.href = r.url;
    link.style.display = 'inline-block';
  } else {
    link.style.display = 'none';
  }

  overlayEl.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  overlayEl.classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modal-close').addEventListener('click', closeModal);
overlayEl.addEventListener('click', e => { if (e.target === overlayEl) closeModal(); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── View toggle ──
document.getElementById('btn-grid').addEventListener('click', () => {
  view = 'grid';
  document.getElementById('btn-grid').classList.add('active');
  document.getElementById('btn-list').classList.remove('active');
  render();
});
document.getElementById('btn-list').addEventListener('click', () => {
  view = 'list';
  document.getElementById('btn-list').classList.add('active');
  document.getElementById('btn-grid').classList.remove('active');
  render();
});

// ── Switcher ──
document.getElementById('btn-vinyl').addEventListener('click', () => switchCollection('vinyl'));
document.getElementById('btn-music').addEventListener('click', () => switchCollection('music'));

// ── Reset ──
document.getElementById('btn-reset').addEventListener('click', () => {
  searchEl.value = ''; genreEl.value = ''; styleEl.value = '';
  yearMinEl.value = ''; yearMaxEl.value = '';
  noteEl.value = '0'; sortEl.value = 'artiste-asc';
  apply();
});

// ── Event listeners ──
let debounce;
searchEl.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(apply, 280);
});
[genreEl, styleEl, yearMinEl, yearMaxEl, noteEl, sortEl].forEach(el =>
  el.addEventListener('change', apply)
);

// ── Boot ──
initFilters();
apply();
</script>
